# TRPG Bot 导航 - Nginx 配置
# 适用: Nginx 1.24.0 + PHP 8.2 (php-fpm)

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;  # 替换为你的域名

    root /www/wwwroot/dicelist;    # 宝塔默认网站目录（按实际情况修改）
    index index.php index.html;

    # 字符集
    charset utf-8;

    # 访问日志
    access_log /www/wwwlogs/dicelist.access.log;
    error_log  /www/wwwlogs/dicelist.error.log;

    # URL 重写（可选，让URL更友好）
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 处理
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass  unix:/tmp/php-cgi-82.sock;  # 宝塔PHP8.2 socket
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;
    }

    # 静态资源缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # 禁止直接访问includes目录
    location /includes/ {
        deny all;
    }
}
